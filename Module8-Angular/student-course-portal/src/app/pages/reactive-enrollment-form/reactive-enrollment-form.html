<div style="padding:30px; max-width:500px;">
  <h1>Reactive Enrollment Form</h1>

  <div *ngIf="submitted" style="background:#e8f5e9; padding:15px; border-radius:5px; margin-bottom:20px; color:green;">
    ✅ Enrollment submitted successfully!
  </div>

  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

    <!-- Student Name -->
    <div style="margin-bottom:15px;">
      <label>Student Name *</label><br>
      <input formControlName="studentName" placeholder="Enter name"
        style="width:100%; padding:8px; margin-top:5px;" />
      <span *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['required']"
        style="color:red;">Name is required</span>
      <span *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['minlength']"
        style="color:red;">Minimum 3 characters required</span>
    </div>

    <!-- Student Email -->
    <div style="margin-bottom:15px;">
      <label>Student Email *</label><br>
      <input formControlName="studentEmail" placeholder="Enter email"
        style="width:100%; padding:8px; margin-top:5px;" />
      <span *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['required']"
        style="color:red;">Email is required</span>
      <span *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['email']"
        style="color:red;">Invalid email format</span>
      <span *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']"
        style="color:orange;">Email is already taken</span>
    </div>

    <!-- Course ID -->
    <div style="margin-bottom:15px;">
      <label>Course ID *</label><br>
      <input formControlName="courseId" placeholder="Enter course ID"
        style="width:100%; padding:8px; margin-top:5px;" />
      <span *ngIf="enrollForm.get('courseId')?.touched && enrollForm.get('courseId')?.errors?.['required']"
        style="color:red;">Course ID is required</span>
      <span *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']"
        style="color:red;">Course code starting with XX is not allowed</span>
    </div>

    <!-- Preferred Semester -->
    <div style="margin-bottom:15px;">
      <label>Preferred Semester *</label><br>
      <select formControlName="preferredSemester" style="width:100%; padding:8px; margin-top:5px;">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <!-- Agree to Terms -->
    <div style="margin-bottom:15px;">
      <input formControlName="agreeToTerms" type="checkbox" />
      <label> I agree to the terms and conditions *</label><br>
      <span *ngIf="enrollForm.get('agreeToTerms')?.touched && enrollForm.get('agreeToTerms')?.errors?.['required']"
        style="color:red;">You must agree to terms</span>
    </div>

    <!-- Additional Courses (FormArray) -->
    <div style="margin-bottom:15px;">
      <label>Additional Courses</label>
      <div formArrayName="additionalCourses">
        <div *ngFor="let ctrl of additionalCourses.controls; let i = index"
          style="display:flex; gap:10px; margin-top:5px;">
          <input [formControlName]="i" placeholder="Course name"
            style="flex:1; padding:8px;" />
          <button type="button" (click)="removeCourse(i)"
            style="background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">
            Remove
          </button>
        </div>
      </div>
      <button type="button" (click)="addCourse()"
        style="margin-top:8px; padding:8px 15px; background:#388e3c; color:white; border:none; border-radius:5px; cursor:pointer;">
        + Add Another Course
      </button>
    </div>

    <!-- Submit Button -->
    <button type="submit" [disabled]="enrollForm.invalid"
      style="padding:10px 20px; background:#1a237e; color:white; border:none; border-radius:5px; cursor:pointer;">
      Submit
    </button>

  </form>
</div>
